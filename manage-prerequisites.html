<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Prerequisites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg,#4ab2b9,#654b6b); min-height: 100vh;">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand mb-0 h1" href="admin_dashboard.html">Manage Prerequisites</a>
            <a href="admin_dashboard.html" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Add Prerequisite</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <select class="form-select">
                            <option selected>Select Course</option>
                            <option value="CS101">CS101 - Programming</option>
                            <option value="CS102">CS102 - Data Structures</option>
                            <option value="MATH201">MATH201 - Calculus</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select class="form-select">
                            <option selected>Select Prerequisite</option>
                            <option value="CS101">CS101 - Programming</option>
                            <option value="CS102">CS102 - Data Structures</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary">Add Prerequisite</button>
                    </div>
                </div>
            </div>
        </div>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Course</th>
                    <th>Prerequisite</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>CS102</td>
                    <td>CS101</td>
                    <td><button class="btn btn-danger btn-sm" onclick="remove()">Remove</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function remove() {
            alert("Prerequisite removed!");
        }
    </script>
</body>
</html>

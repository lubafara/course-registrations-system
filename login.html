<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="style.css" rel="stylesheet">

</head>

<body style="background: linear-gradient(135deg,#4ab2b9,#654b6b); min-height: 100vh;">

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="text-center">
      <div class="mb-4">
        <i class="bi bi-person-circle" style="font-size: 100px; color: white;"></i>
      </div>

      <div class="card p-4 shadow">
        <h3 class="text-center mb-3">Login</h3>

        <form onsubmit="login(event)">
          <input type="email" class="form-control mb-3" placeholder="Email" required>
          <input type="password" class="form-control mb-3" placeholder="Password" required>

          <button class="btn btn-primary w-100">Login</button>
        </form>

        <div class="text-center mt-3">
          <a href="registration.html">Don't have an account? Register</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function login(e) {
      e.preventDefault();

      const email = document.querySelector('input[type="email"]').value;
      if (email.includes("admin")) {
        window.location.href = "admin_dashboard.html";
      } else {
        window.location.href = "student-dashboard.html";
      }
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg,#4ab2b9,#654b6b); min-height: 100vh;">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">Manage Courses</span>
    </div>
</nav>

<div class="container">

    <!-- ADD COURSE -->
    <div class="card mb-4">
        <div class="card-header">
            <h5>Add Course</h5>
        </div>

        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <input id="courseInput" type="text" class="form-control" placeholder="Course Name">
                </div>

                <div class="col-md-2">
                    <button onclick="addCourse()" class="btn btn-primary w-100">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- COURSE LIST -->
    <div class="card">
        <div class="card-header">
            <h5>Course List</h5>
        </div>

        <div class="card-body">
            <ul id="courseList" class="list-group"></ul>
        </div>
    </div>

</div>

<!-- JS -->
<script>
function addCourse() {
    let input = document.getElementById("courseInput");
    let value = input.value;

    if (value === "") return;

    let list = document.getElementById("courseList");

    let item = document.createElement("li");
    item.className = "list-group-item d-flex justify-content-between";

    item.innerHTML = `
        ${value}
        <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">Delete</button>
    `;

    list.appendChild(item);

    input.value = "";
}
</script>

</body>
</html>
